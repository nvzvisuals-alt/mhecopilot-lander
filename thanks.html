<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Received | MHE Copilot</title>

    <!-- Google Fonts for Industrial Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Oswald', 'sans-serif'],
                    },
                    colors: {
                        industrial: {
                            900: '#121212', // Deep near-black
                            800: '#1A1A1A', // Dark metal
                            700: '#2A2A2A', // Gunmetal
                            yellow: '#FFCA28', // Safety yellow
                            orange: '#F57C00', // Warning orange
                        }
                    },
                    backgroundImage: {
                        'grid-pattern': "url('data:image/svg+xml,%3Csvg width=\"40\" height=\"40\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cpath d=\"M0 0h40v40H0z\" fill=\"none\"/%3E%3Cpath d=\"M0 39.5h40M39.5 0v40\" stroke=\"rgba(255,255,255,0.05)\" stroke-width=\"1\"/%3E%3C/svg%3E')",
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-industrial-900 text-gray-300 font-sans antialiased overflow-x-hidden flex flex-col min-h-screen">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 bg-industrial-900/90 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 bg-industrial-yellow flex items-center justify-center font-display font-bold text-black text-lg">
                    M</div>
                <span class="font-display font-bold text-2xl tracking-wider text-white uppercase">MHE Copilot</span>
            </div>
            <div class="hidden md:flex items-center gap-8 font-medium">
                <a href="index.html#problem-solution"
                    class="hover:text-industrial-yellow transition-colors duration-200">The
                    Problem</a>
                <a href="index.html#features"
                    class="hover:text-industrial-yellow transition-colors duration-200">Solutions</a>
                <a href="index.html#contact"
                    class="bg-industrial-yellow text-industrial-900 px-6 py-2.5 font-bold uppercase tracking-wide hover:bg-yellow-400 transition-all duration-200 shadow-[4px_4px_0px_#fff] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_#fff]">Get
                    Demo</a>
            </div>
        </div>
    </nav>

    <!-- Success Message Section -->
    <main class="flex-grow flex items-center justify-center pt-32 pb-24 px-6 relative">
        <div class="absolute inset-0 bg-grid-pattern opacity-30"></div>
        <div class="relative z-10 text-center max-w-2xl bg-industrial-800 p-12 border border-white/10 shadow-2xl"
            data-aos="fade-up">

            <div class="w-20 h-20 mx-auto bg-green-500/10 rounded-full flex items-center justify-center mb-8">
                <i data-lucide="check-circle-2" class="w-10 h-10 text-green-500"></i>
            </div>

            <h1 class="font-display text-4xl text-white uppercase tracking-wide mb-6">Deployment Request Received</h1>
            <div class="w-16 h-1 bg-industrial-yellow mx-auto mb-6"></div>
            <p class="text-gray-400 text-lg mb-10 leading-relaxed">Our technical team will review your parameters and
                contact you shortly.</p>

            <a href="index.html"
                class="inline-block bg-industrial-yellow text-black px-8 py-4 font-display font-bold uppercase tracking-wider text-lg hover:bg-yellow-400 transition-all shadow-[6px_6px_0px_#ffffff] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[4px_4px_0px_#ffffff]">
                &lt;- Return to Terminal
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 py-12 px-6 mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-3">
                <div
                    class="w-6 h-6 bg-industrial-yellow flex items-center justify-center font-display font-bold text-black text-sm">
                    M</div>
                <span class="font-display font-bold text-xl tracking-wider text-white uppercase">MHE Copilot</span>
            </div>
            <div class="text-sm font-medium text-gray-500">
                &copy;
                <script>document.write(new Date().getFullYear())</script> MHE Copilot Logistics Systems. All rights
                reserved.
            </div>
            <div class="flex gap-6 text-sm font-medium">
                <a href="#" class="text-gray-500 hover:text-white transition-colors">Privacy</a>
                <a href="#" class="text-gray-500 hover:text-white transition-colors">Terms</a>
                <a href="#" class="text-gray-500 hover:text-white transition-colors">System Status</a>
            </div>
        </div>
    </footer>

    <!-- AOS JS & Init -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Initialize AOS
        AOS.init({
            duration: 800,
            once: true,
            offset: 100,
        });

        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>

</html>
